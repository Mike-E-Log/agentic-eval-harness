name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Test (keyless — gates monkeypatched / run empty, no vendor SDKs needed)
        run: python -m pytest -q
